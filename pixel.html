<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelSafe - Image Encryption Tool</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #a5b4fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
        }

        @media (max-width: 768px) {
            .workspace {
                grid-template-columns: 1fr;
            }
        }

        /* Control Panel Styles */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="file"] {
            display: none;
        }

        .file-upload-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed var(--border);
            padding: 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .file-upload-btn:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        select, input[type="number"] {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            padding: 0.75rem 1rem;
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--primary);
        }

        .btn-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        .btn-success {
            background: var(--accent);
            color: white;
        }

        .btn-success:hover {
            background: #059669;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        button:disabled {
            background: #334155;
            color: #64748b;
            cursor: not-allowed;
            box-shadow: none !important;
        }

        /* Preview Display Styles */
        .preview-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border);
            border-radius: 16px;
            min-height: 350px;
            position: relative;
            padding: 1rem;
            overflow: hidden;
        }

        .preview-placeholder {
            text-align: center;
            color: var(--text-muted);
        }

        .preview-placeholder svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        canvas {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PixelSafe</h1>
        <p>Simple Image Encryption & Decryption Tool via Pixel Manipulation</p>
    </header>

    <div class="workspace">
        <div class="controls">
            <div class="control-group">
                <label>Select Image</label>
                <label for="imageLoader" class="file-upload-btn">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                    <span id="fileNameDisplay">Choose Image File</span>
                </label>
                <input type="file" id="imageLoader" accept="image/*">
            </div>

            <div class="control-group">
                <label for="algorithm">Manipulation Method</label>
                <select id="algorithm">
                    <option value="xor">Mathematical Operation (XOR Key)</option>
                    <option value="swap">Pixel Positional Swapping</option>
                </select>
            </div>

            <div class="control-group" id="keyGroup">
                <label for="encryptionKey">Secret Key (0 - 255)</label>
                <input type="number" id="encryptionKey" min="1" max="255" value="42">
            </div>

            <div class="btn-container">
                <button id="processBtn" class="btn-primary" disabled>Process Image</button>
                <button id="downloadBtn" class="btn-success" disabled>Download Image</button>
            </div>
        </div>

        <div class="preview-panel">
            <div class="preview-placeholder" id="placeholder">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7v8a2 2 0 002 2h6M8 7V5a2 2 0 012-2h4.586a1 1 0 01.707.293l4.414 4.414a1 1 0 01.293.707V15a2 2 0 01-2 2h-2M8 7H6a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2v-2"></path></svg>
                <p>No image loaded. Upload a file to see preview.</p>
            </div>
            <canvas id="imageCanvas"></canvas>
        </div>
    </div>
</div>

<script>
    const imageLoader = document.getElementById('imageLoader');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const algorithmSelect = document.getElementById('algorithm');
    const keyGroup = document.getElementById('keyGroup');
    const encryptionKeyInput = document.getElementById('encryptionKey');
    const processBtn = document.getElementById('processBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    
    const canvas = document.getElementById('imageCanvas');
    const ctx = canvas.getContext('2d');
    const placeholder = document.getElementById('placeholder');

    let originalImg = null;

    // Toggle key input visibility based on algorithm choice
    algorithmSelect.addEventListener('change', (e) => {
        if (e.target.value === 'swap') {
            keyGroup.style.display = 'none';
        } else {
            keyGroup.style.display = 'flex';
        }
    });

    // Handle Image Uploading
    imageLoader.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        fileNameDisplay.textContent = file.name;
        
        const reader = new FileReader();
        reader.onload = (event) => {
            originalImg = new Image();
            originalImg.onload = () => {
                // Set canvas bounds to fit image dimensions perfectly
                canvas.width = originalImg.width;
                canvas.height = originalImg.height;
                
                // Draw initial image to canvas
                ctx.drawImage(originalImg, 0, 0);
                
                // Show UI elements
                placeholder.style.display = 'none';
                canvas.style.display = 'block';
                processBtn.disabled = false;
                downloadBtn.disabled = true; // wait until processed to download
            };
            originalImg.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // Image Core Processing Engine
    processBtn.addEventListener('click', () => {
        if (!originalImg) return;

        // Reset canvas to standard layout state before manipulation
        ctx.drawImage(originalImg, 0, 0);

        // Fetch Raw underlying standard RGBA byte-array configurations 
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data; 
        const algo = algorithmSelect.value;

        if (algo === 'xor') {
            const key = parseInt(encryptionKeyInput.value, 10) || 42;
            
            // Loop through data array (4 elements per pixel: Red, Green, Blue, Alpha)
            for (let i = 0; i < data.length; i += 4) {
                data[i]     = data[i] ^ key;     // Red Channel
                data[i + 1] = data[i + 1] ^ key; // Green Channel
                data[i + 2] = data[i + 2] ^ key; // Blue Channel
                // data[i+3] is Alpha (transparency), left unmanipulated to keep form intact
            }
        } else if (algo === 'swap') {
            // Reversing the array elements structurally to simulate an inverse layout shift
            // Operates on the structure blocks of 4 bytes per item profile
            const totalPixels = data.length / 4;
            for (let i = 0; i < Math.floor(totalPixels / 2); i++) {
                const startIdx = i * 4;
                const endIdx = (totalPixels - 1 - i) * 4;

                for (let channel = 0; channel < 4; channel++) {
                    const temp = data[startIdx + channel];
                    data[startIdx + channel] = data[endIdx + channel];
                    data[endIdx + channel] = temp;
                }
            }
        }

        // Put the mutated image layout architecture arrays back into canvas framework bounds
        ctx.putImageData(imageData, 0, 0);
        downloadBtn.disabled = false;
    });

    // Trigger Download Feature
    downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'pixel_manipulated_image.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
</script>

</body>
</html>
